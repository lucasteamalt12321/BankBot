<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Установка Webhook</title>
    <style>
        body { font-family: Arial; padding: 40px; max-width: 800px; margin: 0 auto; }
        .status { padding: 20px; margin: 20px 0; border-radius: 8px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #d1ecf1; color: #0c5460; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow-x: auto; }
        button { padding: 12px 24px; font-size: 16px; background: #007AFF; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #0051D5; }
    </style>
</head>
<body>
    <h1>🤖 Установка Telegram Webhook</h1>
    
    <div id="status" class="status loading">
        Нажмите кнопку ниже, чтобы установить webhook...
    </div>
    
    <button onclick="setWebhook()">Установить Webhook</button>
    
    <div id="result"></div>

    <script>
        async function setWebhook() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            
            statusDiv.className = 'status loading';
            statusDiv.textContent = 'Устанавливаю webhook...';
            resultDiv.innerHTML = '';
            
            try {
                const botToken = '8005854770:AAH0yHvEnM3-RNzPDQfnBtoM6tG1_lezxQE';
                const webhookUrl = 'https://bank-bot-ruby.vercel.app/telegram/webhook/2f0cada15d8c40d3331d895340329c328494cba48aef25ee8c1461a7fc81d266';
                const secretToken = '2f0cada15d8c40d3331d895340329c328494cba48aef25ee8c1461a7fc81d266';
                
                const url = `https://api.telegram.org/bot${botToken}/setWebhook`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        url: webhookUrl,
                        secret_token: secretToken,
                        drop_pending_updates: true,
                        allowed_updates: ['message', 'callback_query']
                    })
                });
                
                const data = await response.json();
                
                if (data.ok) {
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '✅ Webhook успешно установлен!';
                    resultDiv.innerHTML = '<h3>Детали:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                    
                    // Проверяем webhook
                    setTimeout(checkWebhook, 1000);
                } else {
                    statusDiv.className = 'status error';
                    statusDiv.textContent = '❌ Ошибка: ' + data.description;
                    resultDiv.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ Ошибка: ' + error.message;
            }
        }
        
        async function checkWebhook() {
            const resultDiv = document.getElementById('result');
            
            try {
                const botToken = '8005854770:AAH0yHvEnM3-RNzPDQfnBtoM6tG1_lezxQE';
                const response = await fetch(`https://api.telegram.org/bot${botToken}/getWebhookInfo`);
                const data = await response.json();
                
                resultDiv.innerHTML += '<h3>Информация о webhook:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                console.error('Ошибка проверки webhook:', error);
            }
        }
    </script>
</body>
</html>
