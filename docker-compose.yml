version: "3.9"

services:
  bank_bot:
    build: .
    command: python run_bot.py bank
    env_file: config/.env
    volumes:
      - ./bot.db:/app/bot.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  bridge_bot:
    build: .
    command: python run_bot.py bridge
    env_file: config/.env
    volumes:
      - ./bot.db:/app/bot.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  vk_bot:
    build: .
    command: python run_bot.py vk
    env_file: config/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
