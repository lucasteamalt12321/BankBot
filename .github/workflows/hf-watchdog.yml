name: HF ↔ Render Failover Watchdog

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_restart:
        description: "Force restart HF even if healthy"
        required: false
        default: "false"
      force_failover:
        description: "Force switch webhook to Render"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: hf-space-watchdog
  cancel-in-progress: false

env:
  HF_SPACE_ID: LucasTeam/BankBot
  HF_HEALTH_URL: https://lucasteam-bankbot.hf.space/health
  HF_WEBHOOK_URL: https://lucasteam-bankbot.hf.space/telegram/webhook
  MIN_RESTART_INTERVAL_SECONDS: "600"
  MAX_RESTARTS_PER_HOUR: "3"
  WATCHDOG_STATE_FILE: .watchdog-state/hf-watchdog-state.json

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Restore watchdog state
        uses: actions/cache/restore@v4
        with:
          path: .watchdog-state
          key: hf-watchdog-state-${{ github.run_id }}
          restore-keys: |
            hf-watchdog-state-

      - name: Check health and failover if needed
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          RENDER_WEBHOOK_URL: ${{ secrets.RENDER_WEBHOOK_URL }}
          FORCE_RESTART: ${{ github.event.inputs.force_restart || 'false' }}
          FORCE_FAILOVER: ${{ github.event.inputs.force_failover || 'false' }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import hmac
          import json
          import os
          import time
          import urllib.error
          import urllib.request
          from pathlib import Path


          # ── Configuration ──────────────────────────────────────────────
          HF_TOKEN = os.environ["HF_TOKEN"].strip()
          BOT_TOKEN = os.environ["BOT_TOKEN"].strip()
          RENDER_WEBHOOK_URL = os.environ.get("RENDER_WEBHOOK_URL", "").strip().rstrip("/")
          HF_WEBHOOK_URL = os.environ["HF_WEBHOOK_URL"].strip().rstrip("/")
          HF_SPACE_ID = os.environ["HF_SPACE_ID"]
          HF_HEALTH_URL = os.environ["HF_HEALTH_URL"]
          MIN_RESTART_INTERVAL = int(os.environ["MIN_RESTART_INTERVAL_SECONDS"])
          MAX_RESTARTS_PER_HOUR = int(os.environ["MAX_RESTARTS_PER_HOUR"])
          FORCE_RESTART = os.environ.get("FORCE_RESTART", "false").lower() == "true"
          FORCE_FAILOVER = os.environ.get("FORCE_FAILOVER", "false").lower() == "true"

          state_path = Path(os.environ["WATCHDOG_STATE_FILE"])
          state_path.parent.mkdir(parents=True, exist_ok=True)


          # ── Helpers ────────────────────────────────────────────────────
          def load_state() -> dict:
              if not state_path.exists():
                  return {"restart_timestamps": [], "active_platform": "hf", "last_failover_ts": 0}
              try:
                  return json.loads(state_path.read_text(encoding="utf-8"))
              except Exception:
                  return {"restart_timestamps": [], "active_platform": "hf", "last_failover_ts": 0}


          def save_state(state: dict) -> None:
              state_path.write_text(json.dumps(state, indent=2), encoding="utf-8")


          def now() -> float:
              return time.time()


          def fetch(url: str, timeout: int = 20) -> tuple[int, str]:
              req = urllib.request.Request(url, method="GET")
              try:
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      return resp.status, resp.read().decode("utf-8", errors="ignore")
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode("utf-8", errors="ignore")
              except Exception as e:
                  return 0, str(e)


          def hf_restart() -> tuple[bool, str]:
              url = f"https://huggingface.co/api/spaces/{HF_SPACE_ID}/restart"
              req = urllib.request.Request(url, method="POST")
              req.add_header("Authorization", f"Bearer {HF_TOKEN}")
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      return True, resp.read().decode("utf-8", errors="ignore")[:500]
              except Exception as e:
                  return False, str(e)


          def tg_set_webhook(target_url: str) -> tuple[bool, str]:
              """Set Telegram webhook to target_url via Bot API."""
              # Derive secret the same way run_bot.py does
              secret = hmac.new(
                  BOT_TOKEN.encode(),
                  b"bankbot-hf-webhook",
                  hashlib.sha256,
              ).hexdigest()
              full_url = f"{target_url}/{secret}"
              api_url = (
                  f"https://api.telegram.org/bot{BOT_TOKEN}/setWebhook"
                  f"?url={urllib.request.quote(full_url, safe='')}&drop_pending_updates=true"
              )
              try:
                  with urllib.request.urlopen(api_url, timeout=30) as resp:
                      body = resp.read().decode("utf-8", errors="ignore")
                      data = json.loads(body)
                      ok = data.get("ok", False)
                      return ok, body[:500]
              except Exception as e:
                  return False, str(e)


          def tg_get_webhook_info() -> dict:
              """Fetch current Telegram webhook info."""
              api_url = f"https://api.telegram.org/bot{BOT_TOKEN}/getWebhookInfo"
              try:
                  with urllib.request.urlopen(api_url, timeout=30) as resp:
                      return json.loads(resp.read().decode("utf-8", errors="ignore"))
              except Exception:
                  return {}


          # ── Main logic ─────────────────────────────────────────────────
          state = load_state()
          current_ts = now()

          # Prune old restarts
          state["restart_timestamps"] = [
              ts for ts in state["restart_timestamps"] if current_ts - ts < 3600
          ]
          restarts_this_hour = len(state["restart_timestamps"])

          # Check HF health
          status, body = fetch(HF_HEALTH_URL, timeout=20)
          hf_healthy = False
          hf_webhook_ok = False
          try:
              data = json.loads(body)
              hf_healthy = status == 200 and data.get("status") == "healthy"
              hf_webhook_ok = data.get("webhook_configured", False) is True
          except Exception:
              pass

          print(f"HF status={status} healthy={hf_healthy} webhook_ok={hf_webhook_ok}")

          # Determine desired platform
          if FORCE_FAILOVER:
              desired_platform = "render"
              print("FORCE_FAILOVER requested → Render")
          elif hf_healthy and hf_webhook_ok:
              desired_platform = "hf"
              print("HF healthy → staying on HF")
          else:
              # HF unhealthy → try restart first, then failover
              if restarts_this_hour < MAX_RESTARTS_PER_HOUR:
                  last_restart = state["restart_timestamps"][-1] if state["restart_timestamps"] else 0
                  if current_ts - last_restart >= MIN_RESTART_INTERVAL or FORCE_RESTART:
                      print("HF unhealthy → restarting...")
                      ok, msg = hf_restart()
                      print(f"Restart result: ok={ok} msg={msg}")
                      if ok:
                          state["restart_timestamps"].append(current_ts)
                          save_state(state)
                          # After restart, webhook may need time. Check again shortly.
                          # For now, don't failover immediately if we just restarted.
                          print("Restart triggered, will re-check in next cycle")
                          exit(0)

              # If restart failed or cooldown → failover to Render
              if RENDER_WEBHOOK_URL:
                  desired_platform = "render"
                  print("HF unhealthy and restart not possible → failing over to Render")
              else:
                  desired_platform = state.get("active_platform", "hf")
                  print("Render not configured → staying on current platform")

          # Check current Telegram webhook
          tg_info = tg_get_webhook_info()
          current_url = (tg_info.get("result") or {}).get("url", "")
          print(f"Current Telegram webhook: {current_url}")

          # Determine target URL
          if desired_platform == "render" and RENDER_WEBHOOK_URL:
              target_url = RENDER_WEBHOOK_URL
          else:
              target_url = HF_WEBHOOK_URL

          # Switch webhook if needed
          secret = hmac.new(BOT_TOKEN.encode(), b"bankbot-hf-webhook", hashlib.sha256).hexdigest()
          expected_current = f"{target_url}/{secret}"

          if current_url != expected_current:
              print(f"Switching webhook to: {target_url}")
              ok, msg = tg_set_webhook(target_url)
              print(f"setWebhook result: ok={ok} msg={msg}")
              if ok:
                  state["active_platform"] = desired_platform
                  if desired_platform == "render":
                      state["last_failover_ts"] = current_ts
                  save_state(state)
                  print(f"Webhook switched to {desired_platform}")
              else:
                  print("WARNING: failed to switch webhook")
          else:
              print(f"Webhook already on {desired_platform}, no change needed")
              state["active_platform"] = desired_platform
              save_state(state)

          print("Watchdog cycle complete")
          PY

      - name: Save watchdog state
        uses: actions/cache/save@v4
        with:
          path: .watchdog-state
          key: hf-watchdog-state-${{ github.run_id }}
